name: "Build & Cache"

on:
  push:
    branches: [master]
  workflow_dispatch:
  workflow_call:
    inputs:
      flake_lock:
        description: "Base64-encoded flake.lock content"
        required: false
        type: string

concurrency:
  group: build-cache-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: cloud
            platform: aarch64-linux
          - host: storage
            platform: x86_64-linux
          - host: raider
            platform: x86_64-linux
          - host: g14
            platform: x86_64-linux
          - host: r2s
            platform: aarch64-linux
          - host: raspi3
            platform: aarch64-linux
          - host: octopi
            platform: aarch64-linux

    name: ${{ matrix.host }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker image prune --all --force

      - uses: actions/checkout@v6

      - name: Setup QEMU for aarch64
        if: matrix.platform == 'aarch64-linux'
        uses: docker/setup-qemu-action@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux i686-linux
            extra-substituters = https://attic.arsfeld.dev/system
            extra-trusted-public-keys = system:mUX40QMM+dqZ0wQaHp7sH50UgiZnSXsInzc9/MvaZRc=

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Override flake.lock
        if: inputs.flake_lock
        run: echo '${{ inputs.flake_lock }}' | base64 -d > flake.lock

      - name: Build and push to cache
        shell: nix develop --command bash -e {0}
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          set -euo pipefail

          echo "Building ${{ matrix.host }}..."
          nix build '.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel' \
            -o "result-${{ matrix.host }}"

          echo "Pushing to Attic cache..."
          attic login system https://attic.arsfeld.dev "$ATTIC_TOKEN"
          attic push system "./result-${{ matrix.host }}"

          echo "Done: ${{ matrix.host }} built and cached"
