name: "Weekly Update"

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      flake_lock: ${{ steps.check.outputs.flake_lock }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
      - name: Update flake inputs
        id: check
        run: |
          set -euo pipefail
          nix flake update
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "flake_lock=$(base64 -w0 flake.lock)" >> "$GITHUB_OUTPUT"

  build:
    needs: update
    if: needs.update.outputs.has_changes == 'true'
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
    with:
      flake_lock: ${{ needs.update.outputs.flake_lock }}
    secrets: inherit

  commit:
    needs: [update, build]
    if: needs.update.outputs.has_changes == 'true' && success()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Commit updated flake.lock
        run: |
          set -euo pipefail
          echo "${{ needs.update.outputs.flake_lock }}" | base64 -d > flake.lock
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add flake.lock
          git commit -m "chore: update flake inputs [skip ci]"
          git push
