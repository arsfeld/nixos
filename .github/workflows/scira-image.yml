name: "Build Scira Image"

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC — picks up upstream changes.
    - cron: "0 6 * * 1"
  push:
    branches: [master]
    paths:
      - ".github/workflows/scira-image.yml"

concurrency:
  group: scira-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push scira
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker image prune --all --force

      - name: Checkout upstream scira
        uses: actions/checkout@v6
        with:
          repository: zaidmukaddam/scira
          ref: main
          path: scira

      - name: Resolve upstream commit
        id: rev
        working-directory: scira
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Patch upstream source for build
        working-directory: scira
        run: |
          # Next.js requires NEXT_PUBLIC_* vars at build time. Runtime secrets
          # come from sops on the host via environmentFiles; these are placeholders.
          printf 'NODE_ENV=production\nNEXT_PUBLIC_MAPBOX_TOKEN=\nNEXT_PUBLIC_POSTHOG_KEY=\nNEXT_PUBLIC_POSTHOG_HOST=\nNEXT_PUBLIC_GOOGLE_MAPS_API_KEY=\n' > .env
          # pnpm 10+ refuses to run native install scripts unless dependencies
          # are explicitly allowed. Upstream uses an `["*"]` wildcard that the
          # current pnpm release doesn't honor, so set the documented escape
          # hatch in pnpm-workspace.yaml.
          if ! grep -q 'dangerouslyAllowAllBuilds' pnpm-workspace.yaml; then
            printf '\ndangerouslyAllowAllBuilds: true\n' >> pnpm-workspace.yaml
          fi
          # The upstream Dockerfile only copies package.json + pnpm-lock.yaml
          # into the deps stage, so pnpm-workspace.yaml isn't visible when
          # `pnpm i` runs. Add it to the COPY.
          sed -i 's|pnpm-lock.yaml\* \./|pnpm-lock.yaml* pnpm-workspace.yaml ./|' Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: scira
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/scira:latest
            ghcr.io/${{ github.repository_owner }}/scira:${{ steps.rev.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
