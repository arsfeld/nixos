  - &host_raspi3 age17y8vddr4fjxxx7awm6qamcuckh6etme2fpay7a80gjev0z4xyaeqcstpds
  - &host_r2s age1qgp8m729pgef4pmz9fdje029pmsa9zp46u00ld8g6kzhf2ufs4sqphyy9w
  - &host_router age15masa7pw2dmr456hx2tk0uhx8vjup9dflfjeq6mey7v0335r2qnqjj6e90
