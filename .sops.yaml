creation_rules:
  - path_regex: secrets/sops/basestar\.yaml$
    key_groups:
      - age:
          - *user_arosenfeld
          - *host_basestar

  - path_regex: secrets/sops/storage\.yaml$
    key_groups:
      - age:
          - *user_arosenfeld
          - *host_storage

  - path_regex: secrets/sops/raider\.yaml$
    key_groups:
      - age:
          - *user_arosenfeld
          - *host_raider

  - path_regex: secrets/sops/pegasus\.yaml$
    key_groups:
      - age:
          - *user_arosenfeld
          - *host_pegasus

  - path_regex: secrets/sops/common\.yaml$
    key_groups:
      - age:
          - *user_arosenfeld
          - *host_basestar
          - *host_storage
          - *host_raider
          - *host_raspi3
          - *host_r2s
          - *host_router
          - *host_pegasus
          - *host_g14
          - *host_octopi

  # ntfy publisher credentials — intentionally narrower than common.yaml.
  # Only hosts that publish to ntfy.arsfeld.one are recipients; embedded
  # appliances (raspi3, r2s, octopi) do not publish and are excluded to
  # keep the credential off their disk.
  - path_regex: secrets/sops/ntfy-client\.yaml$
    key_groups:
      - age:
          - *user_arosenfeld
          - *host_basestar
          - *host_storage
          - *host_raider
          - *host_router
          - *host_pegasus
          - *host_g14
