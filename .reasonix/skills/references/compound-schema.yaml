# Compound Schema — Frontmatter fields for docs/solutions/

## Required fields (all tracks)
- `title`: string — short description of the problem/solution
- `date`: YYYY-MM-DD — when the solution was documented
- `problem_type`: enum — see category mapping below
- `category`: string — directory under docs/solutions/
- `tags`: list of strings — searchable keywords
- `track`: "bug" | "knowledge"

## Bug-track fields (when track: bug)
- `symptoms`: string — observable symptoms (error messages, behavior)
- `root_cause`: string — technical root cause explanation
- `resolution_type`: enum — "code_fix" | "config_change" | "workaround" | "dependency_update" | "process_change"
- `module`: string — affected module/component

## Knowledge-track fields (when track: knowledge)
- `applies_when`: string — conditions or situations where this applies
- `module`: string (optional) — related module/component

## Optional fields (all tracks)
- `last_updated`: YYYY-MM-DD
- `related_issues`: list of URLs or issue numbers
- `related_docs`: list of relative paths to related solution docs
- `severity`: "critical" | "high" | "medium" | "low" — bug track only
- `prevention`: string — how to prevent recurrence (bug track)
